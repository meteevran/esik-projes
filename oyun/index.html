<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cesaret Kalkanı</title>
    <!-- Modern tipografi için Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="game-container">
        <!-- Üst Bilgi (HUD) -->
        <div class="hud">
            <div class="bravery-container">
                <span class="bravery-label">Cesaret Seviyesi</span>
                <div class="bravery-bar-bg">
                    <div id="bravery-fill" class="bravery-bar-fill"></div>
                </div>
            </div>
            <div class="score-display">Puan: <span id="score-val">20</span></div>
        </div>

        <!-- 3. Şahıs Görünüm Sahnesi -->
        <div class="scene">
            <!-- Zorba Karakteri Temsili (Abstract) -->
            <div class="bully-avatar"></div>

            <!-- Zorbanın Diyalog Balonu -->
            <div class="dialogue-box bully-dialogue fade-in" id="bully-text">
                ...
            </div>

            <!-- Oyuncu Omuz Üstü (3rd Person Effect) -->
            <div class="player-avatar"></div>
        </div>

        <!-- Çoktan Seçmeli Cevaplar -->
        <div class="options-container" id="options-box">
            <button class="option-btn" onclick="selectOption(0)" id="opt-0">Seçenek 1</button>
            <button class="option-btn" onclick="selectOption(1)" id="opt-1">Seçenek 2</button>
            <button class="option-btn" onclick="selectOption(2)" id="opt-2">Seçenek 3</button>
        </div>

        <!-- Geribildirim Ekranı (Doğru/Yanlış Karar Sonucu Yapıcı Psikolojik Yorum) -->
        <div id="feedback-overlay" class="hidden">
            <div class="feedback-card">
                <img id="feedback-image" src="" alt="Geribildirim Karakteri" class="feedback-character-img">
                <h2 id="feedback-title">Harika!</h2>
                <p id="feedback-desc">Özgüvenli cevabın cesaretini artırdı.</p>
                <button class="next-btn" onclick="nextScenario()">Devam Et</button>
            </div>
        </div>

        <!-- OYUN SONU EKRANI -->
        <div id="end-screen" class="hidden">
            <div class="end-card">
                <div id="end-badge" class="badge">🛡️</div>
                <h2 id="end-title">Oyun Bitti</h2>
                <div class="end-score-box">
                    <span>Nihai Cesaret Puanın:</span>
                    <span id="end-score" class="final-score">0</span>
                </div>
                <p id="end-desc">Açıklama metni...</p>
                <div class="end-buttons">
                    <button class="next-btn" onclick="initGame()">Tekrar Oyna</button>
                    <button id="next-chapter-btn" class="option-btn" style="text-align: center; display: none;"
                        onclick="nextChapter()">Sonraki Bölüme Geç</button>
                </div>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>

</html>
